version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: medmarket_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       medmarket
      POSTGRES_USER:     medmarket
      POSTGRES_PASSWORD: medmarket_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U medmarket -d medmarket']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: medmarket_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medmarket_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://medmarket:medmarket_dev@postgres:5432/medmarket
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
