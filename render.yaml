services:
  - type: web
    name: medmarket-backend
    env: node
    rootDir: backend
    envVars:
      - key: NODE_VERSION
        value: 22
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    startCommand: pnpm start
    healthCheckPath: /health
  - type: cron
    name: keep-backend-warm
    env: node
    schedule: "*/10 * * * *"
    command: "curl -s https://medmarket-backend.onrender.com/health"
